<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Clean & Green Dashboard</title>
</head>
<body>

<h2>🌱 Clean & Green Carbon Tracker</h2>
<a href="/admin">Go to Admin Panel</a>
<a href="/login">LogOut</a>
<form th:action="@{/submit}" th:object="${energy}" method="post">

    <label>Electricity (kWh):</label>
    <input type="number" step="0.01" th:field="*{electricityKwh}" /><br><br>

    <label>Petrol (Liters):</label>
    <input type="number" step="0.01" th:field="*{petrolLiters}" /><br><br>

    <label>Waste (Kg):</label>
    <input type="number" step="0.01" th:field="*{wasteKg}" /><br><br>

    <button type="submit">Calculate</button>
</form>



</body>
</html>
